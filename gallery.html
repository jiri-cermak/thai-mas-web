    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; }

        .hero .subtitle {
            font-family: 'Merriweather', serif;
            font-size: 18px;
            margin-bottom: 20px;
            color: #81053D;
        }

        .gallery-section {
            padding: 40px 16px 60px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            background: white;
        }

        .gallery-item picture {
            display: block;
            width: 100%;
        }

        .gallery-item img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }

        @media (min-width: 769px) {
            .hero .subtitle {
                font-size: 20px;
                margin-bottom: 28px;
                color: #81053D;
            }

            .gallery-section {
                padding: 50px 20px 70px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 24px;
            }
        }
    </style>
</head>

    <header>
        <a href="index.html"><img src="garuda.png" alt="Thajské masáže Třeboň" class="logo-img"></a>

    </section>

        <div class="gallery-grid" id="gallery-grid"></div>
    </section>
