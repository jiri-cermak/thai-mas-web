<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Sand Background</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Merriweather', serif;
            background-color: #F5EBE1; /* Warm Linen/Sand */
            padding: 50px;
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 15px;
            text-align: center;
            width: 250px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 6px solid #D4AF37;
        }

        .card.variant-2 {
            border-top: 6px solid #81053D;
        }

        .card-content {
            padding: 30px 24px 24px 24px;
            flex-grow: 1;
        }

        .card h3 {
            font-size: 20px;
            color: #81053D;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .card p.card-body {
            color: #4A4A4A;
            font-size: 15px;
            margin: 0;
            line-height: 1.6;
        }

        .card-price-burgundy {
            background-color: #81053D;
            color: #ffdfb7;
            padding: 16px;
            font-weight: 700;
            font-size: 14px;
            margin-top: auto;
            letter-spacing: 0.2px;
        }

        .card-price-cream {
            background-color: #ffdfb7;
            color: #81053D;
            padding: 16px;
            font-weight: 700;
            font-size: 14px;
            margin-top: auto;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-content">
            <h3>Tradiční thajská masáž</h3>
            <p class="card-body">Intenzivní protažení a práce s energetickými liniemi pro uvolnění celého těla bez použití olejů.</p>
        </div>
        <div class="card-price-burgundy">
            1100 Kč/60 m, 1600 Kč/90 m
        </div>
    </div>

    <div class="card variant-2">
        <div class="card-content">
            <h3>Thajská olejová masáž</h3>
            <p class="card-body">Spojení relaxační masáže s aromaterapií, která využívá vzácné thajské byliny a esenciální oleje.</p>
        </div>
        <div class="card-price-cream">
            1100 Kč/60 m, 1600 Kč/90 m
        </div>
    </div>

</body>
</html>
